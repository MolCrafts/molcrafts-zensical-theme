extends: zensical

variant: modern
language: en
favicon: assets/images/moko.svg
logo: assets/images/moko.svg

font:
  text: Inter
  code: JetBrains Mono

icon:
  logo: lucide/atom
  repo: fontawesome/brands/github
  menu: lucide/menu
  search: lucide/search
  close: lucide/x
  top: lucide/circle-arrow-up
  previous: lucide/arrow-left
  next: lucide/arrow-right

features:
  - announce.dismiss
  - content.code.annotate
  - content.code.copy
  - content.code.select
  - content.footnote.tooltips
  - content.tabs.link
  - content.tooltips
  - navigation.footer
  - navigation.indexes
  - navigation.instant
  - navigation.instant.prefetch
  - navigation.path
  - navigation.sections
  - navigation.tabs
  - navigation.tabs.sticky
  - navigation.top
  - navigation.tracking
  - search.highlight
  - search.suggest
  - toc.follow

palette:
  - media: "(prefers-color-scheme: light)"
    scheme: molcrafts
    primary: custom
    accent: custom
    toggle:
      icon: lucide/sun
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: molcrafts-slate
    primary: custom
    accent: custom
    toggle:
      icon: lucide/moon
      name: Switch to light mode
