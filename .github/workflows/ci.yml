name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Build example sites against the wheel
        run: |
          python -m pip install dist/*.whl
          zensical build -f examples/minimal/zensical.toml
          zensical build -f examples/basic/zensical.toml
      - name: Verify zero-config theme defaults
        run: |
          grep -q 'assets/stylesheets/molcrafts.css' examples/minimal/site/index.html
          grep -q 'data-md-color-scheme="default"' examples/minimal/site/index.html
          grep -q 'data-md-color-scheme="slate"' examples/minimal/site/index.html
          grep -q -- '--md-text-font:"Inter"' examples/minimal/site/index.html
          grep -q 'color-scheme: dark' examples/minimal/site/assets/stylesheets/molcrafts.css
