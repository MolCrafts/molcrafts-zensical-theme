name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build distributions
        run: |
          python -m pip install build twine
          python -m build
          twine check dist/*
      - name: Build example sites against the wheel
        run: |
          python -m pip install dist/*.whl
          zensical build -f examples/minimal/zensical.toml
          zensical build -f examples/basic/zensical.toml
