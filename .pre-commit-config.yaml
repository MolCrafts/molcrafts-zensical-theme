# Pre-commit hooks for molcrafts-zensical-theme.
#
# Two layers:
#   pre-commit  -> fast file-hygiene checks (run on every commit)
#   pre-push    -> full CI-parity gate: build + twine check + example builds
#                  (mirrors .github/workflows/ci.yml, runs on every push)
#
# Install both hook types with:  pre-commit install --install-hooks
default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml          # .github/workflows/*.yml, mkdocs_theme.yml
      - id: check-toml          # pyproject.toml, examples/*/zensical.toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ci-parity
        name: CI parity (build + twine check + example site builds)
        entry: scripts/ci-local.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
