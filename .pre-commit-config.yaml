# Pre-commit hooks for molcrafts-zensical-theme.
#
# Run all local checks through pre-commit. Distribution and example-site builds
# are verified independently by .github/workflows/ci.yml.
default_install_hook_types: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml          # .github/workflows/*.yml, mkdocs_theme.yml
      - id: check-toml          # pyproject.toml, examples/*/zensical.toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
